name: "Deploy Front Production"

on:
  push:
    branches:
      - main

env:
  # Mapeamento seguro das suas variáveis
  VPS_HOST: ${{ secrets.VPS_HOST }}
  USERNAME: ${{ secrets.VPS_USER }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
  VITE_FRONT_URL: ${{ secrets.VITE_FRONT_URL }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Exportar secrets do ambiente"
        run: |
          printf "%s\n" "${{ secrets.SECRETS_PRODUCTION }}" | sed 's/\r$//' >> $GITHUB_ENV

      - name: "Criar arquivo .env"
        run: |
          printf "%s\n" "${{ secrets.SECRETS_PRODUCTION }}" | sed 's/\r$//' > .env

      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # 🔑 NOVO: Configura o SSH-Agent e registra a chave e o host automaticamente
      - name: "Configurar Chave SSH e Known Hosts"
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: "Registrar Host Remoto"
        run: ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: "Instalar dependências"
        run: npm ci

      - name: "Build aplicação"
        run: npm run build

      - name: "Deploy Front Production"
        run: |
          set -e

          # Criação de diretórios remotos (Não precisa mais passar -i deploy_key)
          ssh "$USERNAME@$VPS_HOST" "mkdir -p $DEPLOY_PATH/dist && mkdir -p $DEPLOY_PATH/docker/nginx/conf.d"

          # Sincronização de arquivos via rsync (Removido o parâmetro -e "ssh -i ...")
          rsync -az --delete dist/ "$USERNAME@$VPS_HOST:$DEPLOY_PATH/dist/"
          rsync -az .env "$USERNAME@$VPS_HOST:$DEPLOY_PATH/.env"
          rsync -az docker-compose.production.yml "$USERNAME@$VPS_HOST:$DEPLOY_PATH/docker-compose.production.yml"
          rsync -az docker/nginx/conf.d/production.conf "$USERNAME@$VPS_HOST:$DEPLOY_PATH/docker/nginx/conf.d/production.conf"

          # Reinicialização dos containers no servidor externo
          ssh "$USERNAME@$VPS_HOST" "
            set -e &&
            cd $DEPLOY_PATH &&
            docker compose --env-file .env -f docker-compose.production.yml down &&
            docker compose --env-file .env -f docker-compose.production.yml up -d --force-recreate &&
            docker image prune -af
          "

      # O passo de apagar a chave foi removido! A Action oficial limpa tudo da memória ao encerrar.

      - name: "Health Check"
        run: |
          for i in {1..20}; do
            STATUS=$(curl -k -L -s -o /dev/null -w "%{http_code}" "$VITE_FRONT_URL")
            echo "Tentativa $i - Status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Aplicação online!"
              exit 0
            fi
            sleep 10
          done
          echo "Health check falhou."
          exit 1

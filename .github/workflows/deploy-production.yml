name: "Deploy Front Production"

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Exportar secrets do ambiente"
        run: |
          printf "%s\n" "${{ secrets.SECRETS_PRODUCTION }}" | sed 's/\r$//' >> $GITHUB_ENV

      - name: "Criar arquivo .env"
        run: |
          printf "%s\n" "${{ secrets.SECRETS_PRODUCTION }}" | sed 's/\r$//' > .env

      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configurar known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # CORREÇÃO 1: Garantir que o script use a variável exportada do ambiente
          export $(cat .env | xargs)
          for i in 1 2 3 4 5; do
            echo "Tentativa $i para capturar host key..."
            ssh-keyscan -T 30 -H "$VPS_HOST" >> ~/.ssh/known_hosts && break
            sleep 10
          done
          test -s ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: "Instalar dependências"
        run: npm ci

      - name: "Build aplicação"
        # CORREÇÃO 2: Força o runner a injetar o .env na memória do processo de build do Vite
        run: |
          export $(cat .env | xargs)
          npm run build

      - name: "Deploy Front Production"
        run: |
          set -e
          # CORREÇÃO 3: Força a leitura do .env criado no passo anterior para o shell atual do rsync/ssh
          export $(cat .env | xargs)

          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > deploy_key
          chmod 600 deploy_key

          ssh -i deploy_key "$USERNAME@$VPS_HOST" "
            mkdir -p $DEPLOY_PATH/dist &&
            mkdir -p $DEPLOY_PATH/docker/nginx/conf.d
          "

          rsync -az --delete \
            -e "ssh -i deploy_key" \
            dist/ "$USERNAME@$VPS_HOST:$DEPLOY_PATH/dist/"

          rsync -az \
            -e "ssh -i deploy_key" \
            .env "$USERNAME@$VPS_HOST:$DEPLOY_PATH/.env"

          # CORREÇÃO 4: Garantir o envio do nome correto do arquivo que você usa no docker compose comando abaixo
          rsync -az \
            -e "ssh -i deploy_key" \
            docker-compose.production.yml \
            "$USERNAME@$VPS_HOST:$DEPLOY_PATH/docker-compose.production.yml"

          rsync -az \
            -e "ssh -i deploy_key" \
            docker/nginx/conf.d/production.conf \
            "$USERNAME@$VPS_HOST:$DEPLOY_PATH/docker/nginx/conf.d/production.conf"

          ssh -i deploy_key "$USERNAME@$VPS_HOST" "
            set -e &&
            cd $DEPLOY_PATH &&
            docker compose --env-file .env -f docker-compose.production.yml down &&
            docker compose --env-file .env -f docker-compose.production.yml up -d --force-recreate &&
            docker image prune -af
          "

          rm -f deploy_key

      - name: "Health Check"
        run: |
          export $(cat .env | xargs)
          for i in {1..20}; do
            STATUS=$(curl -k -L -s -o /dev/null -w "%{http_code}" "$VITE_FRONT_URL")

            echo "Tentativa $i - Status: $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "Aplicação online!"
              exit 0
            fi

            sleep 10
          done

          echo "Health check falhou."
          exit 1
